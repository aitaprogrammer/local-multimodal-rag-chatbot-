server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        # Assuming backend service name is 'backend' and port is 8000
        # If your API is at root (e.g. /chats), you might need different config.
        # But wait, looking at main.py:
        # @app.post("/chats")
        # The frontend calls probably go to http://localhost:8000 (hardcoded or configured)
        # If frontend calls via relative path (/api/...), we proxy_pass.
        # If frontend code has fetch('http://localhost:8000/...'), it talks to host port 8000 directly
        # which is fine if user exposes backend port.
        # However, cleaner docker setup usually proxies /api -> backend:8000.
        # But modifying frontend code is out of scope unless needed.
        # I'll stick to simple serving for now.
    }
}
